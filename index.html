<!doctype html>
<html lang="km">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="theme-color" content="#1976d2" />
  <title>វត្តមានបុគ្គលិក (Annual Attendance)</title>

  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="logo.png">
  <link rel="apple-touch-icon" href="logo.png">
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <img class="logo" src="logo.png" alt="logo" />
        <div class="brandText">
          <div class="title">បញ្ជីវត្តមានបុគ្គលិក</div>
          <div class="subtitle">Annual Attendance • Summary Sheet • View Only</div>
        </div>
      </div>

      <div class="actions">
        <button id="btnInstall" class="btn ghost" hidden>Install</button>
        <button id="btnRefresh" class="btn">Refresh</button>
      </div>
    </header>

    <main class="content">
      <!-- Controls + KPI -->
      <section class="panel">
        <div class="controls">
          <div class="field">
            <label>ស្វែងរក</label>
            <input id="q" type="search" placeholder="កូដ/ឈ្មោះ/ភេទ/តួនាទី..." autocomplete="off"/>
          </div>

          <div class="field">
            <label>ភេទ</label>
            <select id="gender">
              <option value="">ទាំងអស់</option>
              <option value="M">M</option>
              <option value="F">F</option>
            </select>
          </div>

          <div class="field">
            <label>តម្រៀប</label>
            <select id="sort">
              <option value="code">កូដ</option>
              <option value="name">ឈ្មោះ</option>
              <option value="present_desc">វត្តមាន (ច្រើន→តិច)</option>
              <option value="miss_desc">ភ្លេចស្កេន (ច្រើន→តិច)</option>
              <option value="mission_desc">បេសកម្ម (ច្រើន→តិច)</option>
            </select>
          </div>

          <div class="field">
            <label>View</label>
            <div class="seg">
              <button class="segBtn active" id="btnViewCards" type="button">Cards</button>
              <button class="segBtn" id="btnViewTable" type="button">Table</button>
            </div>
          </div>
        </div>

        <div class="kpis" id="kpis"></div>
      </section>

      <!-- Cards/Table -->
      <section class="panel">
        <div class="panelHeader">
          <div>
            <div class="panelTitle">បុគ្គលិក (សរុបក្នុង ១ ឆ្នាំ)</div>
            <div class="panelHint" id="hint"></div>
          </div>

          <div class="chip">
            <span class="dot"></span>
            Summary Sheet
          </div>
        </div>

        <div id="cards" class="cards"></div>

        <div class="tableWrap" id="tableWrap">
          <table class="table" id="tbl">
            <thead>
              <tr>
                <th>កូដ</th>
                <th>នាមត្រកូល</th>
                <th>នាមខ្លួន</th>
                <th class="center">ភេទ</th>
                <th>តួនាទី</th>
                <th class="right">វត្តមាន</th>
                <th class="right">ភ្លេចស្កេន</th>
                <th class="right">ច្បាប់</th>
                <th class="right">បេសកម្ម</th>
                <th class="center">លម្អិត</th>
              </tr>
            </thead>
            <tbody id="tbody"></tbody>
          </table>
        </div>

        <div class="footerNote" id="footerNote">
          *កំពុងទាញទិន្នន័យ...
        </div>
      </section>
    </main>

    <footer class="bottombar">
      <div class="status" id="status">Ready</div>
      <div class="small">Offline ready (PWA) • Cached static files</div>
    </footer>
  </div>

  <!-- Modal (Detail for 1 employee - Year total) -->
  <div class="modal" id="modal" aria-hidden="true">
    <div class="modalCard" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div class="modalHeader">
        <div>
          <div id="modalTitle" class="modalTitle">Details</div>
          <div id="modalSub" class="modalSub"></div>
        </div>
        <button class="btn ghost" id="btnClose">Close</button>
      </div>

      <div class="modalBody">
        <div class="miniKpis" id="miniKpis"></div>

        <div class="detailBox">
          <div class="detailRow"><span>កូដ</span><b id="d_code">-</b></div>
          <div class="detailRow"><span>ឈ្មោះ</span><b id="d_name">-</b></div>
          <div class="detailRow"><span>ភេទ</span><b id="d_gender">-</b></div>
          <div class="detailRow"><span>តួនាទី</span><b id="d_role">-</b></div>
        </div>
      </div>
    </div>
    <div class="backdrop" id="backdrop"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
