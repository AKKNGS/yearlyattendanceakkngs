<!doctype html>
<html lang="km">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="theme-color" content="#1976d2" />
  <title>វត្តមានបុគ្គលិក (Annual Attendance)</title>

  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="logo.png">
  <link rel="apple-touch-icon" href="logo.png">
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <img class="logo" src="logo.png" alt="logo" />
        <div class="brandText">
          <div class="title">បញ្ជីវត្តមានបុគ្គលិក</div>
          <div class="subtitle">Annual Attendance • View Only</div>
        </div>
      </div>

      <div class="actions">
        <button id="btnInstall" class="btn ghost" hidden>Install App</button>
        <button id="btnRefresh" class="btn">Refresh</button>
      </div>
    </header>

    <main class="content">
      <section class="panel">
        <div class="controls">
          <div class="field">
            <label>ស្វែងរក</label>
            <input id="q" type="search" placeholder="កូដ/ឈ្មោះ/ភេទ/តួនាទី..." autocomplete="off"/>
          </div>

          <div class="field">
            <label>ខែ</label>
            <select id="month"></select>
          </div>

          <div class="field">
            <label>ភេទ</label>
            <select id="gender">
              <option value="">ទាំងអស់</option>
              <option value="M">M</option>
              <option value="F">F</option>
            </select>
          </div>

          <div class="field">
            <label>តម្រៀប</label>
            <select id="sort">
              <option value="code">កូដ</option>
              <option value="name">ឈ្មោះ</option>
              <option value="present_desc">វត្តមាន (ច្រើន→តិច)</option>
              <option value="absent_desc">អវត្តមាន (ច្រើន→តិច)</option>
              <option value="late_desc">យឺត (ច្រើន→តិច)</option>
            </select>
          </div>
        </div>

        <div class="kpis" id="kpis">
          <!-- KPI cards injected by JS -->
        </div>
      </section>

      <section class="panel">
        <div class="panelHeader">
          <div class="panelTitle">តារាងបុគ្គលិក</div>
          <div class="panelHint" id="hint"></div>
        </div>

        <div class="tableWrap">
          <table class="table" id="tbl">
            <thead>
              <tr>
                <th>កូដ</th>
                <th>នាមត្រកូល</th>
                <th>នាមខ្លួន</th>
                <th class="center">ភេទ</th>
                <th>តួនាទី</th>
                <th class="right">វត្តមាន</th>
                <th class="right">ភ្លេចស្កេន</th>
                <th class="right">ច្បាប់</th>
                <th class="right">បេសកម្ម</th>
                <th class="center">លម្អិត</th>
              </tr>
            </thead>
            <tbody id="tbody"></tbody>
          </table>
        </div>

        <div class="footerNote">
          *កំពុងទាញទិន្នន័យ..... 
        </div>
      </section>
    </main>

    <footer class="bottombar">
      <div class="status" id="status">Ready</div>
      <div class="small">
        Offline ready (PWA) • Cached static files
      </div>
    </footer>
  </div>

  <!-- Modal -->
  <div class="modal" id="modal" aria-hidden="true">
    <div class="modalCard" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div class="modalHeader">
        <div>
          <div id="modalTitle" class="modalTitle">Details</div>
          <div id="modalSub" class="modalSub"></div>
        </div>
        <button class="btn ghost" id="btnClose">Close</button>
      </div>
      <div class="modalBody">
        <div class="miniKpis" id="miniKpis"></div>
        <div class="tableWrap">
          <table class="table">
            <thead>
              <tr>
                <th>ខែ</th>
                <th class="right">វត្តមាន</th>
                <th class="right">ភ្លេចស្កេន</th>
                <th class="right">ច្បាប់</th>
                <th class="right">បេសកម្ម</th>
              </tr>
            </thead>
            <tbody id="detailBody"></tbody>
          </table>
        </div>
      </div>
    </div>
    <div class="backdrop" id="backdrop"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
